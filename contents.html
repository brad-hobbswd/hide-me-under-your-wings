<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{

--bg:#f7f3ef;
--card:#fffaf6;
--navy:#1e3240;
--gold:#d8ae63;
--text:#333;
--shadow:0 8px 30px rgba(0,0,0,.10);

}

body{

font-family:Georgia,serif;
background:var(--bg);
color:var(--text);

}

.top{

height:40vh;

background:
linear-gradient(
rgba(0,0,0,.25),
rgba(0,0,0,.45)
),

url("images/banner.png");

background-size:cover;
background-position:center;

display:flex;

justify-content:center;
align-items:center;

}

.top h1{

color:white;

font-size:clamp(
2rem,
5vw,
4rem
);

letter-spacing:2px;

}

.container{

max-width:1100px;

margin:auto;

padding:60px 25px;

}

.grid{

display:grid;

grid-template-columns:
repeat(
auto-fit,
minmax(
260px,
1fr
));

gap:25px;

}

.card{

background:var(--card);

padding:30px;

border-radius:20px;

text-align:center;

box-shadow:
var(--shadow);

opacity:0;

transform:
translateY(30px);

transition:
1s;

}

.card.show{

opacity:1;

transform:
translateY(0);

}

.card a{

text-decoration:none;

color:var(--navy);

font-size:1.1rem;

font-weight:bold;

display:block;

}

.card:hover{

transform:
translateY(-8px);

}

footer{

margin-top:80px;

background:var(--navy);

padding:40px;

color:white;

text-align:center;

}

.home{

display:inline-block;

margin-bottom:30px;

padding:12px 25px;

background:var(--gold);

border-radius:40px;

text-decoration:none;

color:white;

}

</style>

</head>

<script>

const cards=
document.querySelectorAll(
".card"
);

const observer=
new IntersectionObserver(
entries=>{

entries.forEach(
entry=>{

if(
entry.isIntersecting
){

entry.target.classList.add(
"show"
);

}

});

});

cards.forEach(
card=>{

observer.observe(
card
);

});

</script>
