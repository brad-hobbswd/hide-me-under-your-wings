<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>

Hide Me Under Your Wings Lord

</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{

--gold:#d8ae63;
--cream:#f7f3ef;
--navy:#152733;
--text:#3b3b3b;

--shadow:
0 10px 30px
rgba(
0,
0,
0,
.18
);

}

body{

font-family:
Georgia,
serif;

background:
var(--cream);

overflow-x:hidden;

color:
var(--text);

}


/* hero */

.hero{

line-height:0;

position:relative;

}

.heroBanner{

width:100%;

display:block;

}


/* button */

.buttonWrap{

text-align:center;

margin-top:-35px;

position:relative;

z-index:5;

}

.button{

display:inline-block;

padding:
16px 36px;

background:
var(--gold);

color:white;

text-decoration:none;

font-size:1rem;

border-radius:50px;

box-shadow:
var(--shadow);

transition:.4s;

}

.button:hover{

transform:
translateY(-6px);

}


/* intro */

.welcome{

max-width:900px;

margin:auto;

padding:
70px 35px;

text-align:center;

line-height:2;

font-size:1.2rem;

opacity:0;

transform:
translateY(30px);

transition:
1s;

}

.welcome.show{

opacity:1;

transform:
translateY(0);

}


/* divider */

.divider{

width:90px;

height:2px;

background:
var(--gold);

margin:
0 auto
30px;

}


/* footer */

footer{

background:
var(--navy);

padding:
35px;

text-align:center;

color:white;

margin-top:30px;

}


/* mobile */

@media(max-width:768px){

.buttonWrap{

margin-top:-22px;

}

.button{

padding:
14px 28px;

font-size:.95rem;

}

.welcome{

padding:
55px 25px;

font-size:1.05rem;

line-height:1.9;

}

}

</style>

</head>

<body>

<header class="hero">

<img
src="F0C8E8F5-2649-4882-8FAF-25DF1C2D16BA.png"
alt="Hide Me Under Your Wings Lord Banner"
class="heroBanner">

</header>


<div class="buttonWrap">

<a
href="contents.html"
class="button">

Open Book

</a>

</div>


<section
class="welcome"
id="fade">

<div class="divider"></div>

<p>

Some battles stay hidden beneath strength, responsibilities, and quiet smiles.

Healing often begins where nobody else can see.

Journey beneath the wings of Jesus and discover peace, restoration, hope, and renewed strength through life's battles.

</p>

</section>


<footer>

<p>

© 2026 Bradley Hobbs

</p>

</footer>


<script>

const section=
document.getElementById(
"fade"
);

const observer=
new IntersectionObserver(
entries=>{

entries.forEach(
entry=>{

if(
entry.isIntersecting
){

entry.target.classList.add(
"show"
);

}

});

});

observer.observe(
section);

</script>

</body>
</html>
