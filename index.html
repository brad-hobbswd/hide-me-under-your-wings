<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>
Hide Me Under Your Wings Lord
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{

--gold:#d8ae63;
--text:#ffffff;
--shadow:0 8px 30px rgba(0,0,0,.25);

}

body{

font-family:Georgia,serif;
overflow-x:hidden;
background:#f7f3ef;

}

.hero{

height:100vh;

background:
linear-gradient(
rgba(0,0,0,.10),
rgba(0,0,0,.40)
),

url("images/banner.png");

background-size:cover;
background-position:center;

display:flex;

justify-content:flex-end;
align-items:center;
flex-direction:column;

padding:80px 20px;

}

.button{

display:inline-block;

padding:16px 34px;

background:var(--gold);

color:white;

text-decoration:none;

border-radius:40px;

font-size:1rem;

margin-bottom:50px;

box-shadow:var(--shadow);

transition:.5s;

}

.button:hover{

transform:
translateY(-6px);

}

.welcome{

max-width:850px;

margin:auto;

padding:70px 35px;

text-align:center;

line-height:1.9;

opacity:0;

transform:
translateY(30px);

transition:1s;

}

.welcome.show{

opacity:1;

transform:
translateY(0);

}

footer{

background:#152733;

color:white;

padding:40px;

text-align:center;

}

@media(max-width:768px){

.hero{

height:85vh;

}

}

</style>

</head>

<body>

<header class="hero">

<a
href="contents.html"
class="button">

Open Book

</a>

</header>

<section
class="welcome"
id="fade">

<p>

Some battles stay hidden beneath strength, responsibilities, and quiet smiles.

Healing often begins in places unseen.

Journey beneath the wings of Jesus and discover peace, restoration, and hope.

</p>

</section>

<footer>

<p>

© 2026 Bradley Hobbs

</p>

</footer>

<script>

const section=
document.getElementById(
"fade"
);

const observer=
new IntersectionObserver(
entries=>{

entries.forEach(
entry=>{

if(
entry.isIntersecting
){

entry.target.classList.add(
"show"
);

}

});

});

observer.observe(
section
);

</script>

</body>
</html>
