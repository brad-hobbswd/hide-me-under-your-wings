<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>

Hide Me Under Your Wings Lord

</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{

--cream:#f7f3ef;
--gold:#d8ae63;
--navy:#152733;
--text:#494949;

--shadow:
0 10px 30px
rgba(
0,
0,
0,
.18
);

}

body{

font-family:
Georgia,
serif;

background:
var(--cream);

color:
var(--text);

overflow-x:hidden;

}


/* banner */

.hero{

line-height:0;

}

.heroBanner{

width:100%;

display:block;

}


/* button area */

.buttonWrap{

text-align:center;

margin-top:18px;

margin-bottom:10px;

}

.button{

display:inline-block;

padding:
16px 36px;

background:
var(--gold);

color:white;

text-decoration:none;

border-radius:50px;

font-size:1rem;

box-shadow:
var(--shadow);

transition:.4s;

}

.button:hover{

transform:
translateY(-5px);

}


/* welcome */

.welcome{

max-width:950px;

margin:auto;

padding:
40px 35px 65px;

text-align:center;

line-height:2;

font-size:1.2rem;

opacity:0;

transform:
translateY(30px);

transition:1s;

}

.welcome.show{

opacity:1;

transform:
translateY(0);

}


/* line */

.divider{

width:120px;

height:2px;

background:
var(--gold);

margin:
0 auto
35px;

opacity:.8;

}


/* footer */

footer{

background:
var(--navy);

color:white;

text-align:center;

padding:28px;

}


/* mobile */

@media(max-width:768px){

.button{

padding:
14px 28px;

font-size:.95rem;

}

.welcome{

padding:
35px 25px 55px;

font-size:1.05rem;

line-height:1.9;

}

.divider{

margin-bottom:25px;

width:80px;

}

}

</style>

</head>

<body>

<header class="hero">

<img
src="F0C8E8F5-2649-4882-8FAF-25DF1C2D16BA.png"
alt="Hide Me Under Your Wings Lord"
class="heroBanner">

</header>


<div class="buttonWrap">

<a
href="contents.html"
class="button">

Open Book

</a>

</div>


<section
class="welcome"
id="fade">

<div class="divider"></div>

<p>

Some battles stay hidden beneath strength, responsibilities, and quiet smiles.

Healing often begins where nobody else can see.

Journey beneath the wings of Jesus and discover peace, restoration, hope, and renewed strength through life's battles.

</p>

</section>


<footer>

<p>

© 2026 Bradley Hobbs

</p>

</footer>


<script>

const section=
document.getElementById(
"fade"
);

const observer=
new IntersectionObserver(
entries=>{

entries.forEach(
entry=>{

if(
entry.isIntersecting
){

entry.target.classList.add(
"show"
);

}

});

});

observer.observe(
section);

</script>

</body>
</html>
