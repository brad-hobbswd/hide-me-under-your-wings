<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>

Page Not Found

</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{

--bg:#f7f3ef;
--navy:#1e3240;
--gold:#d8ae63;
--text:#333;
--shadow:0 10px 30px rgba(0,0,0,.15);

}

body{

font-family:Georgia,serif;

background:

linear-gradient(
rgba(0,0,0,.20),
rgba(0,0,0,.45)
),

url("images/banner.png");

background-size:cover;
background-position:center;

min-height:100vh;

display:flex;

justify-content:center;
align-items:center;

padding:30px;

}

.box{

max-width:800px;

background:
rgba(255,250,246,.96);

padding:60px;

border-radius:30px;

text-align:center;

box-shadow:
var(--shadow);

opacity:0;

transform:
translateY(30px);

transition:1.2s;

}

.box.show{

opacity:1;

transform:
translateY(0);

}

h1{

font-size:
clamp(
2.5rem,
6vw,
5rem
);

margin-bottom:25px;

color:var(--navy);

}

p{

font-size:1.1rem;

line-height:2;

margin-bottom:35px;

color:var(--text);

}

.button{

display:inline-block;

padding:14px 30px;

background:
var(--gold);

color:white;

text-decoration:none;

border-radius:40px;

}

.button:hover{

transform:
translateY(-4px);

}

</style>

</head>

<body>

<section
class="box"
id="fade">

<h1>

Page Not Found

</h1>

<p>

The path may have taken an unexpected turn.

Even during moments where direction feels uncertain, shelter remains found beneath His wings.

Return home and continue the journey.

</p>

<a
href="index.html"
class="button">

Return Home

</a>

</section>

<script>

const section=
document.getElementById(
"fade"
);

const observer=
new IntersectionObserver(
entries=>{

entries.forEach(
entry=>{

if(
entry.isIntersecting
){

entry.target.classList.add(
"show"
);

}

});

});

observer.observe(
section);

</script>

</body>
</html>
